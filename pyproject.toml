[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true

[tool.bandit]
exclude_dirs = ["tests", ".venv"]

[tool.pylint]
max-line-length = 100

[tool.vulture]
min_confidence = 80

[tool.pyupgrade]

[tool.flake8]
max-line-length = 100
extend-ignore = ["E203", "W503"]