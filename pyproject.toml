[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-career-mentor"
version = "1.0.0"
description = "A FastAPI and Next.js career guidance application for resume review, skill-gap analysis, and learning roadmaps."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-only" }
authors = [
  { name = "AI Career Mentor Contributors" }
]
dependencies = [
  "fastapi",
  "uvicorn[standard]"
]

[project.urls]
Homepage = "https://code.swecha.org/Sravya25/ai-career-mentor"
Repository = "https://code.swecha.org/Sravya25/ai-career-mentor"

[project.scripts]
ai-career-mentor = "app:main"

[tool.setuptools]
py-modules = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
  "--cov=.",
  "--cov-report=term-missing",
  "--cov-fail-under=80"
]

[tool.coverage.run]
branch = true
source = ["."]
omit = [
  "tests/*",
  "frontend/*",
  ".venv/*",
  "venv/*",
  "setup.py"
]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = true
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:"
]

[tool.ruff]
target-version = "py311"
line-length = 88
extend-exclude = [
  "frontend",
  "ai-career-mentor",
  ".venv",
  "venv",
  "build",
  "dist"
]

[tool.ruff.lint]
select = [
  "A",
  "ARG",
  "B",
  "C4",
  "DTZ",
  "E",
  "F",
  "FAST",
  "I",
  "N",
  "PERF",
  "PIE",
  "PT",
  "PTH",
  "RET",
  "RUF",
  "S",
  "SIM",
  "T20",
  "UP",
  "W"
]
ignore = [
  "S101"
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.11"
files = ["app.py", "tests"]
ignore_missing_imports = true
warn_unused_configs = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
no_implicit_optional = true
check_untyped_defs = true

[tool.vulture]
paths = ["app.py", "tests"]
min_confidence = 80
sort_by_size = true
exclude = ["frontend", ".venv", "venv"]

[tool.bandit]
targets = ["app.py"]
exclude_dirs = ["tests", "frontend", ".venv", "venv", "ai-career-mentor"]
skips = ["B101"]

[tool.pylint.main]
py-version = "3.11"
ignore = ["frontend", "ai-career-mentor", ".venv", "venv"]
jobs = 0

[tool.pylint.messages_control]
disable = [
  "missing-module-docstring",
  "missing-function-docstring",
  "too-few-public-methods"
]

[tool.pylint.format]
max-line-length = 88

[tool.pyupgrade]
py311-plus = true
