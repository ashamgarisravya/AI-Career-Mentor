stages:
  - lint
  - format
  - type_check
  - test
  - security

variables:
  PYTHON_VERSION: "3.12"

default:
  before_script:
    - python --version
    - python -m pip install ruff black mypy pytest bandit
    - python -m pip install -r requirements.txt || true

ruff_lint:
  stage: lint
  script:
    - python -m ruff check . || true

black_format_check:
  stage: format
  script:
    - python -m black --check . || true

mypy_type_check:
  stage: type_check
  script:
    - python -m mypy . || true

pytest_tests:
  stage: test
  script:
    - python -m pytest || true

bandit_scan:
  stage: security
  script:
    - python -m bandit -r . || true