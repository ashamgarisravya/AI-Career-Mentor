[pytest]
testpaths = tests
addopts =
    --strict-markers
    --strict-config
    -W ignore::ResourceWarning
    -m "not integration"
    --cov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
markers =
    integration: Streamlit page smoke tests that exercise the app runtime harness.
filterwarnings =
    ignore::ResourceWarning
    ignore:PyPDF2 is deprecated.*:DeprecationWarning
