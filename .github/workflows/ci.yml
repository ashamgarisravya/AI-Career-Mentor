name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  quality:
    name: Quality, Security, and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Ruff
        run: python -m ruff check app.py pages utils tests

      - name: Run Mypy
        run: python -m mypy app.py pages utils

      - name: Run Bandit
        run: python -m bandit -c pyproject.toml -r app.py pages utils

      - name: Run pip-audit
        run: python -m pip_audit --disable-pip --no-deps --cache-dir .pip-audit-cache --ignore-vuln PYSEC-2026-212 --ignore-vuln CVE-2026-33682 -r requirements.txt -r requirements-dev.txt

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Run tests with coverage
        run: python -m pytest

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: error
