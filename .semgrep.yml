rules:
  - id: avoid-print
    pattern: print(...)
    message: Avoid print statements in production code.
    severity: WARNING
    languages:
      - python
  - id: python-dangerous-subprocess-shell
    message: Avoid shell=True with subprocess calls.
    severity: WARNING
    languages:
      - python
    patterns:
      - pattern: subprocess.$FUNC(..., shell=True, ...)
  - id: python-hardcoded-secret-placeholder
    message: Avoid hardcoded secrets. Use environment variables and .env.example placeholders.
    severity: WARNING
    languages:
      - python
    patterns:
      - pattern-regex: (?i)(api_key|secret|password|token)\s*=\s*["'][^"']+["']
